# Include this file from every HTTPS location that serves the NDR frontend.
# `always` is required so the header is also returned for 304 and error responses.
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' https://translate.google.com https://translate.googleapis.com; style-src 'self' 'unsafe-inline' https://translate.googleapis.com; img-src 'self' data: blob: https://www.gstatic.com https://www.ndrdgh.gov.in https://translate.google.com https://translate.googleapis.com; font-src 'self' data:; connect-src 'self' https://ndr.dghindia.gov.in https://translate.google.com https://translate.googleapis.com; frame-src https://www.google.com; media-src 'self' blob:; worker-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests" always;

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-site" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
