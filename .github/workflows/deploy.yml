name: Deploy Full Stack via AWS SSM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name:  Checkout code
        uses: actions/checkout@v3

      - name:  Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name:  Deploy Backend via AWS SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${{ secrets.AWS_INSTANCE_ID }}" \
            --parameters 'commands=[
              "echo \" Starting Backend Deployment...\"",
              "cd /var/www/gov-react-portal/backend",
              "git stash",
              "git pull origin main",
              "echo \" Installing backend dependencies...\"",
              "npm install --production",
              "echo \" Restarting backend...\"",
              "pm2 restart backend || pm2 start index.js --name backend",
              "pm2 status backend",
              "echo \" Backend deployment completed!\""
            ]' \
            --comment "Backend deployment from GitHub Actions"

      - name:  Deploy Frontend via AWS SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${{ secrets.AWS_INSTANCE_ID }}" \
            --parameters 'commands=[
              "echo \" Starting Frontend Deployment...\"",
              "cd /var/www/gov-react-portal",
              "git pull origin main",
              "echo \" Installing frontend dependencies...\"",
              "npm install",
              "echo \" Building production frontend...\"",
              "npm run build",
              "echo \" Restarting Nginx...\"",
              "sudo systemctl restart nginx",
              "echo \" Frontend deployment completed!\""
            ]' \
            --comment "Frontend deployment from GitHub Actions"

      - name:  Deployment Summary
        run: |
          echo "🎉 Deployment initiated successfully!"
          echo "🌐 Website: https://dghindia.gov.in"
          echo "Check AWS Systems Manager console for command execution status"
