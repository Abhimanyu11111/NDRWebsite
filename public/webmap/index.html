<script>
    var map = L.map("map", {
        zoomControl: false,
        maxZoom: 28,
        minZoom: 5
    }).fitBounds([
        [1.9630989318257743, 50.54268426441992],
        [39.471463175126075, 114.65491922874146]
    ]);

    var hash = new L.Hash(map);
    map.attributionControl.setPrefix(
        '<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; ' +
        '<a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; ' +
        '<a href="https://qgis.org">QGIS</a>'
    );

    var zoomControl = L.control.zoom({
        position: "topleft"
    }).addTo(map);

    L.control.locate({
        locateOptions: {
            maxZoom: 19
        }
    }).addTo(map);

    var measureControl = new L.Control.Measure({
        position: "topleft",
        primaryLengthUnit: "meters",
        secondaryLengthUnit: "kilometers",
        primaryAreaUnit: "sqmeters",
        secondaryAreaUnit: "hectares"
    });
    measureControl.addTo(map);

    document.getElementsByClassName("leaflet-control-measure-toggle")[0].innerHTML = "";
    document.getElementsByClassName("leaflet-control-measure-toggle")[0].className += " fas fa-ruler";

    var bounds_group = new L.featureGroup([]);
    function setBounds() {
        map.setMaxBounds(map.getBounds());
        map.setMinZoom(map.getZoom());
    }

    function escapeHtml(value) {
        return String(value == null ? "" : value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function buildAttributeTable(properties) {
        var html = "<table class='attr-table'>";
        for (var key in properties) {
            html += "<tr><th>" + escapeHtml(key) + "</th><td>" + escapeHtml(properties[key]) + "</td></tr>";
        }
        html += "</table>";
        return html;
    }

    function bindPopupTable(feature, layer) {
        layer.on("click", function(e) {
            L.popup({
                maxWidth: 360,
                maxHeight: 320,
                autoPan: true
            })
            .setLatLng(e.latlng)
            .setContent(buildAttributeTable(feature.properties))
            .openOn(map);
        });
    }

    function style_STATE_BOUNDARY_1_0() {
        return {
            pane: "pane_STATE_BOUNDARY_1",
            opacity: 1,
            color: "rgba(2,4,2,1.0)",
            dashArray: "",
            lineCap: "square",
            lineJoin: "bevel",
            weight: 1.0,
            fillOpacity: 0,
            interactive: true
        };
    }

    function style_SEDIMENTARY_BASIN_2_0(feature) {
        switch (String(feature.properties["CATEGORY"])) {
            case "CATEGORY-I":
                return {
                    pane: "pane_SEDIMENTARY_BASIN_2",
                    opacity: 1,
                    color: "rgba(56,128,54,1.0)",
                    dashArray: "",
                    lineCap: "butt",
                    lineJoin: "miter",
                    weight: 1.0,
                    fill: true,
                    fillOpacity: 1,
                    fillColor: "rgba(182,223,168,1.0)",
                    interactive: true
                };
            case "CATEGORY-II":
                return {
                    pane: "pane_SEDIMENTARY_BASIN_2",
                    opacity: 1,
                    color: "rgba(56,128,54,1.0)",
                    dashArray: "",
                    lineCap: "butt",
                    lineJoin: "miter",
                    weight: 1.0,
                    fill: true,
                    fillOpacity: 1,
                    fillColor: "rgba(253,191,111,1.0)",
                    interactive: true
                };
            case "CATEGORY-III":
                return {
                    pane: "pane_SEDIMENTARY_BASIN_2",
                    opacity: 1,
                    color: "rgba(56,128,54,1.0)",
                    dashArray: "",
                    lineCap: "butt",
                    lineJoin: "miter",
                    weight: 1.0,
                    fill: true,
                    fillOpacity: 1,
                    fillColor: "rgba(242,175,224,1.0)",
                    interactive: true
                };
            default:
                return {
                    pane: "pane_SEDIMENTARY_BASIN_2",
                    opacity: 1,
                    color: "rgba(56,128,54,1.0)",
                    dashArray: "",
                    lineCap: "butt",
                    lineJoin: "miter",
                    weight: 1.0,
                    fill: true,
                    fillOpacity: 1,
                    fillColor: "rgba(182,223,168,1.0)",
                    interactive: true
                };
        }
    }

function style_DEGREE_1X1_3_0() {

map.createPane("pane_WORLD_IMAGERY_0");
map.getPane("pane_WORLD_IMAGERY_0").style.zIndex = 400;
map.getPane("pane_WORLD_IMAGERY_0").style["mix-blend-mode"] = "normal";

var layer_WORLD_IMAGERY_0 = L.tileLayer(
    "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
    {
        pane: "pane_WORLD_IMAGERY_0",
        opacity: 0.84,
        attribution: "",
        minZoom: 5,
        maxZoom: 28
    }
);
map.addLayer(layer_WORLD_IMAGERY_0);


function createGeoJsonLayer(options) {
    map.createPane(options.pane);
    map.getPane(options.pane).style.zIndex = options.zIndex;
    map.getPane(options.pane).style["mix-blend-mode"] = "normal";

    var layer = new L.geoJson(options.data, {
        attribution: "",
        interactive: options.interactive !== false,
        dataVar: options.dataVar,
        layerName: options.layerName,
        pane: options.pane,
        onEachFeature: options.onEachFeature || (options.interactive === false ? null : bindPopupTable),
        style: options.style
    });

    bounds_group.addLayer(layer);
    map.addLayer(layer);
    return layer;
}


    var layer_STATE_BOUNDARY_1 = createGeoJsonLayer({
        data: json_STATE_BOUNDARY_1,
        dataVar: "json_STATE_BOUNDARY_1",
        layerName: "layer_STATE_BOUNDARY_1",
        pane: "pane_STATE_BOUNDARY_1",

        pane: "pane_NOMINATION_BLOCK_9",
        zIndex: 409,
        style: style_NOMINATION_BLOCK_9_0
    });

    setBounds();


    var i = 0;
    layer_STATE_BOUNDARY_1.eachLayer(function(layer) {
        layer.bindTooltip(
            layer.feature.properties["STATE"] !== null
                ? String('<div style="color:#0c0c0c;font-size:5pt;font-weight:bold;font-family:\'Open Sans\', sans-serif;">' + layer.feature.properties["STATE"] + "</div>")
                : "",
            {
                permanent: true,
                offset: [0, -16],
                className: "css_STATE_BOUNDARY_1"
            }
        );
        labels.push(layer);
        totalMarkers += 1;
        layer.added = true;
        addLabel(layer, i);
        i++;
    });

    resetLabels([layer_STATE_BOUNDARY_1]);
    map.on("zoomend", function() {
        resetLabels([layer_STATE_BOUNDARY_1]);
    });
    map.on("layeradd", function() {
        resetLabels([layer_STATE_BOUNDARY_1]);
    });
    map.on("layerremove", function() {
        resetLabels([layer_STATE_BOUNDARY_1]);
